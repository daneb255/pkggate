name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tooling
        run: pip install build twine

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib,sys; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          echo "Tag:     $TAG"
          echo "Package: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject version $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: python -m build

      - name: Generate PyPI package SBOM
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          python -m venv /tmp/sbom-env
          /tmp/sbom-env/bin/pip install --quiet "$WHEEL"
          /tmp/sbom-env/bin/pip install --quiet cyclonedx-bom
          /tmp/sbom-env/bin/cyclonedx-py environment -o dist/sbom.cdx.json
          mkdir -p dist/pypi
          cp dist/*.whl dist/*.tar.gz dist/pypi/

      - name: Check artifacts
        run: twine check dist/*.whl dist/*.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pkggate
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/pypi

  smoke-test:
    name: Smoke-test TestPyPI install
    runs-on: ubuntu-latest
    needs: publish-testpypi
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ \
                      --extra-index-url https://pypi.org/simple/ \
                      pkggate

      - name: Verify package imports and core modules load
        run: |
          python -c "
          from pkggate.config import Settings
          from pkggate.policy.engine import load_policy, PolicyEngine
          from pkggate.intel.osv import OsvIntel
          print('import OK')
          "

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: smoke-test
    environment:
      name: pypi
      url: https://pypi.org/p/pkggate
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS="dist/*.whl dist/*.tar.gz dist/sbom.cdx.json#CycloneDX SBOM (PyPI package)"
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/*.whl dist/*.tar.gz \
              "dist/sbom.cdx.json#CycloneDX SBOM (PyPI package)" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              dist/*.whl dist/*.tar.gz \
              "dist/sbom.cdx.json#CycloneDX SBOM (PyPI package)"
          fi
