name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Bandit (Python Security)
        run: bandit -r src/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Run Safety (Dependency Check)
        run: safety check --json > safety-report.json
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Upload Safety report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: safety-report
          path: safety-report.json

      - name: Comment PR with Security Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Security Scan Results\n\n';

            try {
              const bandit = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));
              const issues = bandit.results?.length || 0;
              comment += `✅ **Bandit**: ${issues > 0 ? '⚠️ ' + issues + ' issues' : 'No issues found'}\n`;
            } catch (e) {
              comment += '❌ **Bandit**: Failed to run\n';
            }

            try {
              const safety = JSON.parse(fs.readFileSync('safety-report.json', 'utf8'));
              const vulns = safety.vulnerabilities?.length || 0;
              comment += `✅ **Safety**: ${vulns > 0 ? '⚠️ ' + vulns + ' vulnerabilities' : 'No vulnerabilities found'}\n`;
            } catch (e) {
              comment += '❌ **Safety**: Failed to run\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true
